name: CI

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  lint:
    name: Lint (strict)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run strict linter
        run: npm run lint:ci

      - name: Run promise discipline lint for test entrypoints
        run: npm run lint:test-promises

      - name: PR lint annotations
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-eslint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          eslint_flags: "src --ext ts --max-warnings 0"
          reporter: github-pr-check
          filter_mode: nofilter
          fail_level: warning

      - name: CI summary
        if: always()
        run: |
          echo "## Lint" >> $GITHUB_STEP_SUMMARY
          echo "- Strict mode: enabled (\`--max-warnings 0\`)" >> $GITHUB_STEP_SUMMARY
          echo "- Test async discipline: enabled for critical test entrypoints (\`@typescript-eslint/no-floating-promises\`)" >> $GITHUB_STEP_SUMMARY
          echo "- PR annotations: reviewdog (\`github-pr-check\`)" >> $GITHUB_STEP_SUMMARY

  tests:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUITE_REPORT_PATH_CORE: suite-reports/core.json
      MANDATORY_SUITES_CORE: suite/xmlWriter.test.js,suite/configurationXmlUpdater.test.js,suite/servicesCoverage.test.js,suite/fixtureMatrix.test.js
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Upload core suite report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-suite-report
          path: suite-reports/core.json

      - name: Append core suite summary
        if: always()
        run: |
          node scripts/render-suite-report-summary.js suite-reports/core-summary.md suite-reports/core.json
          cat suite-reports/core-summary.md >> $GITHUB_STEP_SUMMARY

  coverage:
    name: Coverage (delta)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run coverage
        # Ensure we don't compare against stale/committed coverage artifacts.
        run: |
          rm -rf coverage
          npm run test:coverage

      - name: Check coverage delta
        run: npm run coverage:check

      - name: Upload coverage summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage/coverage-summary.json

  vscode-tests:
    name: VSCode integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    env:
      SUITE_REPORT_PATH_VSCODE: suite-reports/vscode.json
      MANDATORY_SUITES_VSCODE: suite/integration.test.js,suite/metadataWatcherService.test.js,suite/propertiesIntegration.test.js,suite/rightsEditor.integration.test.js,suite/formLifecycle.integration.test.js
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run VSCode integration tests (headless)
        run: |
          set -o pipefail
          npm run test:vscode:ci > vscode-tests.log 2>&1
          status=$?
          echo "---- VSCode integration test errors ----"
          # Keep console output small; show only lines that look like failures/errors.
          grep -nEi "(error|referenceerror|typeerror|assertionerror|enoent|failed|failed to|extension host test runner error|process completed with exit code|exit code [1-9][0-9]*)" vscode-tests.log | tail -n 80 || true
          exit $status

      - name: Upload VSCode test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vscode-tests.log
          path: vscode-tests.log

      - name: Upload VSCode suite report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vscode-suite-report
          path: suite-reports/vscode.json

      - name: Append VSCode suite summary
        if: always()
        run: |
          node scripts/render-suite-report-summary.js suite-reports/vscode-summary.md suite-reports/vscode.json
          cat suite-reports/vscode-summary.md >> $GITHUB_STEP_SUMMARY

  smoke-tests:
    name: Smoke tests (required)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      SUITE_REPORT_PATH_SMOKE: suite-reports/smoke.json
      MANDATORY_SUITES_SMOKE: suite/smoke/smoke.test.js
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests (blocking)
        run: |
          set -o pipefail
          xvfb-run -a npm run test:smoke > smoke-tests.log 2>&1
          status=$?
          echo "---- Smoke test errors ----"
          grep -nEi "(error|referenceerror|typeerror|assertionerror|enoent|failed|precondition|extension host test runner error|process completed with exit code|exit code [1-9][0-9]*)" smoke-tests.log | tail -n 80 || true
          exit $status

      - name: Upload smoke test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-tests.log
          path: smoke-tests.log

      - name: Upload smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-artifacts
          path: smoke-artifacts/**
          if-no-files-found: ignore

      - name: Upload smoke suite report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-suite-report
          path: suite-reports/smoke.json

      - name: Append smoke suite summary
        if: always()
        run: |
          node scripts/render-suite-report-summary.js suite-reports/smoke-summary.md suite-reports/smoke.json
          cat suite-reports/smoke-summary.md >> $GITHUB_STEP_SUMMARY
